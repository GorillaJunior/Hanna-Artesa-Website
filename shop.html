<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanna Artesa | Prodavnica</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
  <script src="site-data.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body class="shop-page">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand-home" href="index.html" aria-label="Hanna Artesa">
        <img class="brand-logo" src="logo.png" alt="Hanna Artesa logo">
      </a>

      <nav class="nav" id="navMenu" aria-label="Glavna navigacija">
        <a href="shop.html" aria-current="page">Prodavnica</a>
        <a href="index.html#story">Nasa prica</a>
        <a href="index.html#collections">Kolekcije</a>
        <a href="index.html#contact">Kontakt</a>
      </nav>

      <div class="header-actions">
        <button class="cart-button header-btn" id="cartToggle" type="button" aria-label="Otvori korpu">
          <span class="cart-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="presentation" focusable="false">
              <path d="M3 5h2l2.2 9.2a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.8L20 8H7.1" />
              <circle cx="10" cy="19" r="1.7" />
              <circle cx="17" cy="19" r="1.7" />
            </svg>
          </span>
          <span class="cart-copy">
            <span class="cart-label">Korpa</span>
            <span class="cart-total" data-cart-total>0 RSD</span>
          </span>
          <span class="cart-count" data-cart-count>0</span>
        </button>
        <button class="menu-toggle" id="menuToggle" aria-label="Otvori meni" type="button">&#9776;</button>
      </div>
    </div>
  </header>

  <div class="cart-drawer" id="cartDrawer" hidden>
    <button class="cart-backdrop" data-cart-close type="button" aria-label="Zatvori korpu"></button>
    <aside class="cart-panel" role="dialog" aria-modal="true" aria-labelledby="cartTitle">
      <div class="cart-panel-head">
        <h2 class="cart-title" id="cartTitle">Korpa</h2>
        <button class="cart-close" data-cart-close type="button" aria-label="Zatvori korpu">&times;</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <p class="cart-empty" id="cartEmpty">Korpa je trenutno prazna.</p>
      <div class="cart-footer">
        <div class="cart-total-row">
          <span>Ukupno</span>
          <strong id="cartTotalValue">0 RSD</strong>
        </div>
      </div>
    </aside>
  </div>

  <main class="shop-main">
    <section class="section shop-section">
      <div class="container">
        <div class="products-grid" id="productsGrid" aria-label="Proizvodi"></div>
      </div>
    </section>
  </main>
</body>
</html>
